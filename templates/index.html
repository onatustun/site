{% extends "base.html" %}

{% block content %}
  <div class="w-full flex flex-col gap-y-2 p-6 mb-12 max-w-md aspect-[1.75/1]">
    <h1 class="w-min text-5xl/10 tracking-tight text-nowrap">
      {{ config.extra.author }}
    </h1>

    <nav class="w-min flex gap-x-2">
    {% for link in config.extra.links %}
      <a class="text-xl/4 tracking-wide underline underline-offset-2" href="{{ link.path }}">
        {{ link.name }}
      </a>
    {% endfor %}
    </nav>
  </div>
{% endblock content %}
